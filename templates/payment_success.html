{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Payment Successful | Cosmo Enterprises</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="{% static 'css/modern-theme.css' %}" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(135deg, #1e1b4b 0%, #3D32A6 50%, #312e81 100%) !important;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Inter', sans-serif;
        }
        .success-card {
            background: var(--bg-surface);
            border: 1px solid var(--border-color);
            border-radius: 20px;
            padding: 3rem;
            text-align: center;
            max-width: 500px;
            width: 100%;
            box-shadow: 0 20px 60px rgba(0,0,0,0.5);
            animation: fadeInUp 0.6s ease-out;
        }
        .success-icon {
            width: 80px;
            height: 80px;
            background: rgba(74, 222, 128, 0.15);
            border: 2px solid #4ade80;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 1.5rem auto;
            color: #4ade80;
            font-size: 2.5rem;
            box-shadow: 0 0 20px rgba(74, 222, 128, 0.3);
        }
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

    <div class="success-card">
        <div class="success-icon">
        </div>
        <h2 class="text-white fw-bold mb-3">Payment Received!</h2>
        <p class="text-muted mb-4">
            Thank you for your payment. Your invoice has been marked as paid and our finance team has been notified.
        </p>
        <p class="text-white fw-semibold mb-4">
            A receipt has been sent to your email address.
        </p>
        <hr class="border-secondary my-4">
        <p class="text-muted small mb-0">
            {{ company_name }} &bull; 
        </p>
    </div>

</body>
</html>
